name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  create-release-draft:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      release-id: ${{ steps.release.outputs.release_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES_PATH=docs/release/${VERSION}.md" >> "$GITHUB_ENV"

      - name: Create or update GitHub release draft
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f "${RELEASE_NOTES_PATH}" ]; then
            echo "Missing release notes file: ${RELEASE_NOTES_PATH}" >&2
            exit 1
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file "${RELEASE_NOTES_PATH}" \
              --draft
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file "${RELEASE_NOTES_PATH}" \
              --draft \
              --verify-tag
          fi

          RELEASE_ID="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" --jq '.id')"
          echo "release_id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"

  publish-tauri:
    needs: create-release-draft
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Resolve version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES_PATH=docs/release/${VERSION}.md" >> "$GITHUB_ENV"

      - name: Sync package versions from tag
        shell: bash
        run: |
          bun run release:sync-version -- "${RELEASE_VERSION}" --verify-release-notes

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release-draft.outputs.release-id }}
          tagName: ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          tauriScript: bun tauri
          args: ${{ matrix.args }}

  bump-version:
    needs: publish-tauri
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES_PATH=docs/release/${VERSION}.md" >> "$GITHUB_ENV"

      - name: Sync version files on main
        shell: bash
        run: |
          bun run release:sync-version -- "${RELEASE_VERSION}"

      - name: Sync README download links from release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node scripts/release/update-readme-downloads.mjs "${RELEASE_VERSION}" --repo "${GITHUB_REPOSITORY}"

      - name: Commit and push version bump
        shell: bash
        run: |
          if git diff --quiet -- package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json README.md README_en.md "${RELEASE_NOTES_PATH}"; then
            echo "No version bump needed"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json README.md README_en.md "${RELEASE_NOTES_PATH}"
          git commit -m "chore: bump version to ${RELEASE_VERSION}"
          git push origin HEAD:main

  publish-release:
    needs:
      - publish-tauri
      - bump-version
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" --draft=false --latest
